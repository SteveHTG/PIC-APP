<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Plugged In Charging</title>
    <!-- SPA fallback for GitHub Pages: encodes the requested path into a
         query string and redirects to the app shell, which restores it
         (see the paired script in index.html). pathSegmentsToKeep = 1
         keeps the /<repo>/ prefix of a project site. Set to 0 for a
         custom domain / user site served at root. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
